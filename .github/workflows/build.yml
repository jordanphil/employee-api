name: Build Employee API

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/employee-api:latest .

      - name: Push Docker image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/employee-api:latest
